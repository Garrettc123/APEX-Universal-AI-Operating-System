name: Branch Janitor

# Deletes remote branches that are already fully merged into the default branch.
# Safe by construction: only branches whose tip is an ancestor of main are
# removed, so nothing unmerged is ever lost. Open-PR head branches and the
# default branch are always skipped.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List what would be deleted without deleting'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: branch-janitor
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete merged branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          DEFAULT="${{ github.event.repository.default_branch }}"
          git fetch origin --prune

          # Head refs of open PRs must never be deleted.
          OPEN_HEADS="$(gh pr list --repo "${{ github.repository }}" --state open \
            --json headRefName --jq '.[].headRefName' 2>/dev/null || true)"

          deleted=0
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin); do
            b="${ref#origin/}"
            case "$b" in
              "$DEFAULT"|HEAD) continue ;;
            esac
            if grep -qxF "$b" <<<"$OPEN_HEADS"; then
              echo "skip (open PR head): $b"; continue
            fi
            if git merge-base --is-ancestor "origin/$b" "origin/$DEFAULT"; then
              if [ "$DRY_RUN" = "true" ]; then
                echo "would delete (merged): $b"
              else
                echo "deleting (merged): $b"
                git push origin --delete "$b" && deleted=$((deleted+1)) || true
              fi
            fi
          done
          echo "Done. Deleted: $deleted (dry_run=$DRY_RUN)"
