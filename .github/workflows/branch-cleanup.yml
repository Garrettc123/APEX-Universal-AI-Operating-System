name: Branch Janitor

# Auto-removes junk branches so they never pile up again. Three safe categories:
#   1. Fully integrated  — every commit is already in the default branch
#      (merged OR patch-equivalent / cherry-picked). Detected via `git cherry`,
#      so nothing unique is ever lost.
#   2. Disposable bot branches — matching BOT_PREFIXES (copilot/*, vercel/*),
#      which are throwaway automation artifacts.
# Open-PR head branches, the default branch, and anything under keep prefixes
# (claude/*) are NEVER deleted unless they are fully integrated.

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'List what would be deleted without deleting'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: branch-janitor
  cancel-in-progress: false

env:
  BOT_PREFIXES: 'copilot/ vercel/'
  KEEP_PREFIXES: 'claude/'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prune junk branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          DEFAULT="${{ github.event.repository.default_branch }}"
          git fetch origin --prune

          OPEN_HEADS="$(gh pr list --repo "${{ github.repository }}" --state open \
            --json headRefName --jq '.[].headRefName' 2>/dev/null || true)"

          deleted=0
          for ref in $(git for-each-ref --format='%(refname:short)' refs/remotes/origin); do
            b="${ref#origin/}"
            case "$b" in "$DEFAULT"|HEAD) continue ;; esac

            if grep -qxF "$b" <<<"$OPEN_HEADS"; then
              echo "skip (open PR head): $b"; continue
            fi

            # Fully integrated? No commit on the branch is missing from default
            # (covers both merged and patch-equivalent/cherry-picked branches).
            plus="$(git cherry "origin/$DEFAULT" "origin/$b" 2>/dev/null | grep -c '^+' || true)"
            reason=""
            if [ "$plus" -eq 0 ]; then
              reason="integrated"
            else
              for p in $BOT_PREFIXES; do
                case "$b" in "$p"*) reason="stale-bot" ;; esac
              done
            fi

            # Never auto-delete keep-prefixed branches that still have unique work.
            if [ "$reason" = "stale-bot" ]; then
              for k in $KEEP_PREFIXES; do
                case "$b" in "$k"*) reason="" ;; esac
              done
            fi

            [ -z "$reason" ] && { echo "keep ($plus unique): $b"; continue; }

            if [ "$DRY_RUN" = "true" ]; then
              echo "would delete ($reason): $b"
            else
              echo "deleting ($reason): $b"
              git push origin --delete "$b" && deleted=$((deleted+1)) || true
            fi
          done
          echo "Done. Deleted: $deleted (dry_run=$DRY_RUN)"
