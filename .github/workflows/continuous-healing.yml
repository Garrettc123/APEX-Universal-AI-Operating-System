name: Continuous Healing
on:
  schedule:
    - cron: '0 7 * * *'  # Daily health check at 7am UTC
  workflow_dispatch:
jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "🏥 Health check" && find . -name '*.json' | while read f; do python -m json.tool "$f" > /dev/null 2>&1 || echo "Issue: $f"; done
