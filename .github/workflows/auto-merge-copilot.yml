name: Auto-Merge Copilot PRs
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Check secrets
        id: secrets-check
        run: |
          echo "has_token=${{ secrets.GITHUB_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Auto-merge ready Copilot PRs
        if: steps.secrets-check.outputs.has_token == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Only ever touch PRs authored by Copilot — never human-authored PRs.
          OPEN_PRS=$(gh pr list --repo "${{ github.repository }}" --state open \
            --json number,isDraft,mergeStateStatus,author 2>/dev/null || echo '[]')

          echo "$OPEN_PRS" | jq -r '
            .[]
            | select(.isDraft == false)
            | select((.author.login // "") | ascii_downcase | test("copilot"))
            # CLEAN = mergeable AND all required checks have passed.
            | select(.mergeStateStatus == "CLEAN")
            | .number
          ' | while read -r PR_NUM; do
            echo "Auto-merging Copilot PR #$PR_NUM"
            gh pr merge "$PR_NUM" --repo "${{ github.repository }}" \
              --squash --auto --delete-branch || true
          done
